# Tiap 15 menit: unduh domains_isp dari Komdigi di runner GitHub, lalu unggah ke
# GitHub Release tetap (tag). VPS bisa ambil file lewat URL publik tanpa akses Komdigi.
#
# Persiapan sekali: setelah workflow pertama sukses, URL unduhan stabil:
#   https://github.com/OWNER/REPO/releases/download/domains-isp-cache/domains_isp
#
# Manual: Actions → "Komdigi domains_isp mirror" → Run workflow

name: Komdigi domains_isp mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: komdigi-domains-isp-mirror
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Unduh dari Komdigi
        env:
          URL: https://trustpositif.komdigi.go.id/assets/db/domains_isp
        run: |
          set -euxo pipefail
          curl -fL --retry 5 --retry-delay 10 \
            --connect-timeout 30 \
            --max-time 0 \
            --speed-limit 1024 --speed-time 600 \
            -A "NawalaAPI-GitHubActions/1.0" \
            -o domains_isp "$URL"
          test -s domains_isp
          ls -lh domains_isp
          sha256sum domains_isp | tee domains_isp.sha256

      - name: Unggah ke Release (untuk curl di VPS)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          TAG=domains-isp-cache
          if ! gh release view "$TAG" --json tagName -q .tagName 2>/dev/null; then
            gh release create "$TAG" \
              --title "Komdigi domains_isp mirror" \
              --notes "File diperbarui otomatis dari Komdigi. Unduh: \`domains_isp\` (+ checksum)."
          fi
          gh release upload "$TAG" domains_isp domains_isp.sha256 --clobber
